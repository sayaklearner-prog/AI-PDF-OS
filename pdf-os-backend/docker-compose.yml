version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pdfos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pdfos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pdfos-network

  redis:
    image: redis:7-alpine
    container_name: pdfos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pdfos-network

  minio:
    image: minio/minio:latest
    container_name: pdfos-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - pdfos-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  pdfos-network:
    driver: bridge
